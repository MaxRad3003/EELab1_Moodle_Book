<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Link Manager</title>
</head>
<body>

<div dir="rtl" style="text-align: right; direction: rtl;">
    <div class="moodle-snippet-custom" dir="rtl" style="color: #1e293b; line-height: 1.625; font-family: 'Assistant', 'Segoe UI', system-ui, -apple-system, sans-serif; direction: rtl; unicode-bidi: isolate; text-align: right; font-size: 16px;">
        <div class="moodle-content-inner" style="direction: rtl; unicode-bidi: isolate; text-align: right;">
            <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Exp01 External Link Manager</title>
</head>
<body style="margin: 0; background-color: #f4f6f9; color: #263238; font-family: Arial, 'David', sans-serif; line-height: 1.6;">
    <div style="max-width: 1180px; margin: 0 auto; padding: 24px;">
        <div style="background-color: #ffffff; border: 1px solid #d8dee6; border-radius: 8px; padding: 24px; margin-bottom: 18px;">
            <h1 style="font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; line-height: 1.25; margin: 0 0 8px 0; color: #005696; font-size: 28px;">מנהל קישורים חיצוניים - Exp01</h1>
            <p style="margin: 0; color: #52616b;">כלי מקומי לעדכון קישורי Moodle, Tinkercad, Falstad, MATLAB Grader ופעילויות נוספות. שמרו את הקובץ המעודכן בשם <strong>external_links.json</strong> בתיקיית <strong>tool_links</strong>. אפשר גם להפיק היפר-קישור HTML מוכן להדבקה בפרק Moodle Book.</p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px;">
            <label style="display: inline-block; background-color: #005696; color: white; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                טעינת JSON
                <input id="fileInput" type="file" accept="application/json,.json" style="display: none;">
            </label>
            <button id="downloadJson" type="button" style="background-color: #28a745; color: white; border: 0; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">שמירת JSON</button>
            <button id="addLink" type="button" style="background-color: #17a2b8; color: white; border: 0; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">הוספת קישור</button>
            <button id="makeMarkdown" type="button" style="background-color: #6c757d; color: white; border: 0; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">יצירת Markdown</button>
        </div>

        <div id="summary" style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px;"></div>
        <div id="linksGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px;"></div>

        <div style="background-color: #ffffff; border: 1px solid #d8dee6; border-radius: 8px; padding: 18px; margin-top: 18px;">
            <h2 style="font-weight: 700; margin-bottom: 0.75rem; line-height: 1.25; margin-top: 0; color: #005696; font-size: 20px;">פלט לתחזוקה</h2>
            <textarea id="output" style="width: 100%; min-height: 220px; box-sizing: border-box; direction: ltr; font-family: Consolas, monospace; border: 1px solid #cfd6df; border-radius: 6px; padding: 12px;"></textarea>
        </div>
    </div>

    <script>
        const defaultData = {
            experiment: "Exp01",
            updated: new Date().toISOString().slice(0, 10),
            links: [
                { id: "equipment_book", platform: "Moodle Book", title: "מדריך ציוד: רב-מודד וספק כוח", linkText: "פתיחת מדריך הציוד במודל", url: "https://moodle.sce.ac.il/mod/book/view.php?id=1215505", location: "Global equipment links", status: "ready", notes: "קישור גלובלי למונחים" },
                { id: "prelab_quiz", platform: "Moodle Quiz", title: "חידון הכנה לניסוי 1", linkText: "מעבר לחידון ההכנה במודל", url: "", location: "01_PreLab_index_sub.html", status: "missing", notes: "להכניס קישור Moodle לאחר יצירת החידון" },
                { id: "safety_quiz", platform: "Moodle Quiz", title: "מבחן בטיחות", linkText: "מעבר למבחן הבטיחות במודל", url: "", location: "01_PreLab_Exp01_00_Safety_sub.html", status: "missing", notes: "אם מבחן הבטיחות הוא פעילות כללית בקורס, אפשר לקשר אליו כאן" },
                { id: "prelab_question_xml", platform: "Moodle Question XML", title: "מאגר שאלות הכנה XML", linkText: "פתיחת קובץ שאלות XML", url: "01_PreLab/Moodle Quix _XML/Exp01_PreLab_Quiz.xml", location: "01_PreLab_index_sub.html", status: "ready", notes: "קובץ מקומי ליבוא שאלות ל-Moodle" },
                { id: "tinkercad_class", platform: "Tinkercad Circuits Class", title: "פעילות Tinkercad: מטריצה, ספק ורב-מודד", linkText: "פתיחת פעילות Tinkercad", url: "https://www.tinkercad.com/things/3Ehb7iogzWc-basic-", embedUrl: "https://www.tinkercad.com/embed/3Ehb7iogzWc?editbtn=1", location: "01_PreLab_Exp01_04_Tinkercad_sub.html", status: "ready", notes: "קישור לפעילות Tinkercad של ניסוי 1" },
                { id: "falstad_series_parallel", platform: "Falstad", title: "סימולציות טורי/מקבילי, קצר ונתק", linkText: "פתיחת סימולציית Falstad", url: "", location: "02_InLab_Exp01_02_PartC_sub.html", status: "missing", notes: "קישור Falstad או דף Moodle שמרכז סימולציות" },
                { id: "matlab_grader", platform: "MATLAB Grader", title: "עיבוד מדידות וחישוב סטייה יחסית", linkText: "פתיחת פעילות MATLAB Grader", url: "", location: "03_PostLab_Exp01_00_Report_sub.html", status: "missing", notes: "להכניס קישור לפעילות MATLAB Grader" },
                { id: "report_assignment", platform: "Moodle Assignment", title: "הגשת דוח מסכם", linkText: "הגשת הדוח המסכם", url: "", location: "03_PostLab_Exp01_00_Report_sub.html", status: "missing", notes: "להכניס קישור למטלת ההגשה" }
            ]
        };

        let data = JSON.parse(JSON.stringify(defaultData));
        const grid = document.getElementById("linksGrid");
        const summary = document.getElementById("summary");
        const output = document.getElementById("output");

        function cleanStatus(item) {
            if (item.url && item.url.trim()) return "ready";
            return "missing";
        }

        function render() {
            data.updated = new Date().toISOString().slice(0, 10);
            data.links.forEach(item => item.status = cleanStatus(item));
            const ready = data.links.filter(item => item.status === "ready").length;
            const missing = data.links.length - ready;
            summary.innerHTML = `
                <div style="background-color: #ffffff; border: 1px solid #d8dee6; border-radius: 8px; padding: 12px 16px;"><strong>סה"כ:</strong> ${data.links.length}</div>
                <div style="background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; border-radius: 8px; padding: 12px 16px;"><strong>מוכנים:</strong> ${ready}</div>
                <div style="background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; border-radius: 8px; padding: 12px 16px;"><strong>חסרים:</strong> ${missing}</div>
            `;
            grid.innerHTML = "";
            data.links.forEach((item, index) => {
                const statusColor = item.status === "ready" ? "#28a745" : "#ff9900";
                const card = document.createElement("div");
                card.style.cssText = "background-color:#fff;border:1px solid #d8dee6;border-radius:8px;padding:16px;";
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px;">
                        <strong style="color:#005696;">${escapeHtml(item.platform)}</strong>
                        <span style="background-color:${statusColor};color:white;border-radius:20px;padding:3px 10px;font-size:12px;">${item.status === "ready" ? "מוכן" : "חסר"}</span>
                    </div>
                    <label style="display:block;margin-bottom:8px;">מזהה
                        <input data-field="id" data-index="${index}" value="${escapeAttr(item.id)}" style="width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:8px;">כותרת
                        <input data-field="title" data-index="${index}" value="${escapeAttr(item.title)}" style="width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:8px;">טקסט ההיפר-קישור
                        <input data-field="linkText" data-index="${index}" value="${escapeAttr(item.linkText || item.title)}" style="width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:8px;">פלטפורמה
                        <input data-field="platform" data-index="${index}" value="${escapeAttr(item.platform)}" style="width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:8px;">URL
                        <input data-field="url" data-index="${index}" value="${escapeAttr(item.url)}" placeholder="https://..." style="direction:ltr;width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:8px;">מיקום בספר
                        <input data-field="location" data-index="${index}" value="${escapeAttr(item.location)}" style="direction:ltr;width:100%;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">
                    </label>
                    <label style="display:block;margin-bottom:12px;">הערות
                        <textarea data-field="notes" data-index="${index}" style="width:100%;min-height:62px;box-sizing:border-box;border:1px solid #cfd6df;border-radius:5px;padding:8px;">${escapeHtml(item.notes)}</textarea>
                    </label>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button type="button" data-action="copyText" data-index="${index}" style="background-color:#005696;color:white;border:0;border-radius:5px;padding:8px 12px;cursor:pointer;">העתקת היפר-קישור</button>
                        <button type="button" data-action="copyButton" data-index="${index}" style="background-color:#28a745;color:white;border:0;border-radius:5px;padding:8px 12px;cursor:pointer;">העתקת כפתור</button>
                        <button type="button" data-action="delete" data-index="${index}" style="background-color:#d9534f;color:white;border:0;border-radius:5px;padding:8px 12px;cursor:pointer;">מחיקה</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            bindInputs();
        }

        function bindInputs() {
            document.querySelectorAll("[data-field]").forEach(el => {
                el.addEventListener("input", () => {
                    const index = Number(el.getAttribute("data-index"));
                    const field = el.getAttribute("data-field");
                    data.links[index][field] = el.value;
                    data.links[index].status = cleanStatus(data.links[index]);
                });
            });
            document.querySelectorAll("[data-action='delete']").forEach(btn => {
                btn.addEventListener("click", () => {
                    const index = Number(btn.getAttribute("data-index"));
                    data.links.splice(index, 1);
                    render();
                });
            });
            document.querySelectorAll("[data-action='copyText']").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const item = data.links[Number(btn.getAttribute("data-index"))];
                    const html = item.url ? `<a href="${escapeAttr(item.url)}" target="_blank" style="color: #005696; text-decoration: underline;">${escapeHtml(item.linkText || item.title)}</a>` : `${item.title} - קישור חסר`;
                    output.value = html;
                    try { await navigator.clipboard.writeText(html); } catch (e) {}
                });
            });
            document.querySelectorAll("[data-action='copyButton']").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const item = data.links[Number(btn.getAttribute("data-index"))];
                    const html = item.url ? `<a href="${escapeAttr(item.url)}" target="_blank" style="display: inline-block; background-color: #005696; color: white; padding: 10px 18px; text-decoration: none; border-radius: 6px; font-weight: bold;">${escapeHtml(item.linkText || item.title)}</a>` : `${item.title} - קישור חסר`;
                    output.value = html;
                    try { await navigator.clipboard.writeText(html); } catch (e) {}
                });
            });
        }

        function markdown() {
            data.links.forEach(item => item.status = cleanStatus(item));
            const lines = [
                "# External Links - " + data.experiment,
                "",
                "Updated: " + new Date().toISOString().slice(0, 10),
                "",
                "| Platform | Title | URL | Location | Status | Notes |",
                "| :--- | :--- | :--- | :--- | :--- | :--- |"
            ];
            data.links.forEach(item => {
                lines.push(`| ${item.platform} | ${item.title} | \`${item.url || "TBD_IN_MOODLE"}\` | \`${item.location}\` | ${item.status} | ${item.notes || ""} |`);
            });
            output.value = lines.join("\n");
        }

        document.getElementById("fileInput").addEventListener("change", event => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    data = JSON.parse(reader.result);
                    if (!Array.isArray(data.links)) throw new Error("Missing links array");
                    render();
                } catch (error) {
                    alert("לא ניתן לקרוא את קובץ ה-JSON");
                }
            };
            reader.readAsText(file);
        });

        document.getElementById("downloadJson").addEventListener("click", () => {
            data.updated = new Date().toISOString().slice(0, 10);
            data.links.forEach(item => item.status = cleanStatus(item));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "external_links.json";
            a.click();
            URL.revokeObjectURL(a.href);
        });

        document.getElementById("addLink").addEventListener("click", () => {
            data.links.push({ id: "new_link", platform: "Moodle", title: "קישור חדש", linkText: "פתיחת הפעילות", url: "", location: "", status: "missing", notes: "" });
            render();
        });

        document.getElementById("makeMarkdown").addEventListener("click", markdown);

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, "&#096;");
        }

        render();
    </script>
</body>
</html>



        </div>
    </div>
</div>

</body>
</html>
