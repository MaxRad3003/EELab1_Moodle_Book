        /* Embed the same styles as moodle_snippet for consistency */
        .moodle-snippet-custom {
            --primary-color: #005696;

            --danger-color: #d9534f;

        .moodle-snippet-custom .section-title { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; margin-top: 0; }
        .moodle-snippet-custom .sub-title { color: var(--primary-color); margin-top: 0; }
        .moodle-snippet-custom .block-title { color: var(--primary-color); border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 30px; }

        /* Structural Blocks */

        /* Steps Components */
        .moodle-snippet-custom .step-box { background-color: var(--box-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; }
        .moodle-snippet-custom .step-number { background-color: var(--primary-color); color: white; font-size: 24px; font-weight: bold; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 50%; margin-left: 20px; flex-shrink: 0; }
        .moodle-snippet-custom .step-content h4 { margin: 0 0 5px 0; color: var(--primary-color); font-size: 18px; }
        .moodle-snippet-custom .step-content p { margin: 0; font-size: 14px; color: #555; }

        /* Layouts */
        .moodle-snippet-custom .roadmap-container { display: flex; justify-content: space-between; margin-bottom: 40px; background: #f8f9fa; padding: 15px; border-radius: 50px; border: 1px solid #e9ecef; text-align: center; font-size: 13px; }
        .moodle-snippet-custom .roadmap-step { flex: 1; }
        .moodle-snippet-custom .roadmap-circle { width: 30px; height: 30px; color: white; border-radius: 50%; margin: 0 auto 5px; line-height: 30px; font-weight: bold; }
        
        .moodle-snippet-custom .flex-grid { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .moodle-snippet-custom .flex-item { flex: 1; min-width: 250px; }

        /* Special Components */
        .moodle-snippet-custom .matlab-box { text-align: center; background-color: #f4f6f9; border: 1px solid #cce5ff; padding: 30px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .moodle-snippet-custom .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .moodle-snippet-custom .data-table th { background-color: #003366; color: white; padding: 10px; border: 1px solid #ddd; }
        .moodle-snippet-custom .data-table td { padding: 10px; border: 1px solid #ddd; }
        
        .moodle-snippet-custom .h5p-container { background-color: #f4f6f9; border: 1px solid #cce5ff; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .moodle-snippet-custom .h5p-placeholder { background: white; border: 1px dashed #ccc; padding: 10px; margin-top: 10px; text-align: center; }
        .moodle-snippet-custom .success-banner { margin-top: 40px; padding: 20px; background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 8px; text-align: center; }

        /* Utility Helpers */
        .moodle-snippet-custom .bg-primary { background-color: var(--primary-color) !important; }
        .moodle-snippet-custom .bg-secondary { background-color: var(--secondary-color) !important; }
        .moodle-snippet-custom .bg-danger { background-color: var(--danger-color) !important; }
        .moodle-snippet-custom .bg-success { background-color: var(--success-color) !important; }
        .moodle-snippet-custom .bg-warning { background-color: var(--warning-color) !important; }
        .moodle-snippet-custom .bg-muted { background-color: #6c757d !important; }
        .moodle-snippet-custom .text-danger { color: var(--danger-color) !important; }
    </style>

            <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>exp03 ac dc comparison</title>
</head>
<body>

<div dir="rtl" style="text-align: right; direction: rtl;">
    <div class="moodle-snippet-custom" dir="rtl" style="color: #1e293b; line-height: 1.625; font-family: 'Assistant', 'Segoe UI', system-ui, -apple-system, sans-serif; direction: rtl; unicode-bidi: isolate; text-align: right; font-size: 16px;">
        <div class="moodle-content-inner" style="box-sizing: border-box; direction: rtl; unicode-bidi: isolate; text-align: right; max-width: 980px; margin: 0 auto; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1.25rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);">
            <!-- להטמעה ישירה בעורך של Moodle באמצעות פלאגין JSXGraph -->
    <div id="exp03-ac-dc-comparison" class="interactive-panel" style="box-sizing: border-box; background: #f7fafc; padding: 10px;">

        <div class="controls" style="box-sizing: border-box; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 10px; align-items: end;">
            <div class="control-box" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px;">
                <label for="seriesVp" style="box-sizing: border-box; display: block; font-weight: 700; color: #243b53; margin-bottom: 4px; font-size: 0.9rem;">מתח שיא \(V_p\)</label>
                <input type="range" id="seriesVp" min="1" max="15" step="0.1" value="10" style="width: 100%; box-sizing: border-box;">
            </div>
            <div class="control-box" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px;">
                <label for="seriesR" style="box-sizing: border-box; display: block; font-weight: 700; color: #243b53; margin-bottom: 4px; font-size: 0.9rem;">התנגדות \(R\) [Ω]</label>
                <input type="range" id="seriesR" min="100" max="2000" step="100" value="1000" style="width: 100%; box-sizing: border-box;">
            </div>
            <div class="control-box" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px;">
                <label for="dcAuto" style="box-sizing: border-box; display: block; font-weight: 700; color: #243b53; margin-bottom: 4px; font-size: 0.9rem;">
                    <input type="checkbox" id="dcAuto" checked style="box-sizing: border-box; width: auto; margin-left: 8px;">
                    קבע \(V_{DC}=V_{RMS}\) אוטומטית
                </label>
                <input type="range" id="dcVoltage" min="0" max="15" step="0.1" value="7.07" disabled style="width: 100%; box-sizing: border-box;">
            </div>
        </div>

        <div class="source-columns" style="box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="source-column" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px;">
                <h4 style="box-sizing: border-box; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; line-height: 1.25; font-size: 0.95rem; margin: 0 0 8px; padding-bottom: 4px; border-bottom: 2px solid #00a4e4; color: #005696;">מעגל AC</h4>
                <div class="heat-sim" style="box-sizing: border-box; background: #fff8e5; border: 1px solid #ffe08a; border-radius: 8px; padding: 6px; margin-bottom: 8px; text-align: right;">
                    <strong style="box-sizing: border-box; display: block; color: #7a4b00; font-size: 0.85rem; margin-bottom: 4px;">חימום נגד (AC)</strong>
                    <div class="heat-track" style="box-sizing: border-box; height: 10px; background: #fff; border: 1px solid #f0ad4e; border-radius: 999px; overflow: hidden; direction: ltr;"><div class="heat-fill" id="acHeatFill" style="box-sizing: border-box; height: 100%; width: 0; background: #f0ad4e; transition: width .2s ease;"></div></div>
                    <span class="heat-value" id="acHeatValue" style="box-sizing: border-box; direction: ltr; display: inline-block; color: #7a4b00; font-weight: 700; margin-top: 2px; font-size: 0.85rem;">50 mW</span>
                </div>
                <div class="graph-wrap" style="box-sizing: border-box; border: 1px solid #cbd5df; border-radius: 8px; background: #fff; overflow: hidden; padding: 0;"><div id="seriesVoltageBoard" class="jxgbox" style="box-sizing: border-box; width: 100%; height: 250px; position: relative; overflow: hidden; margin: 0; border: 0; background: #ffffff;"></div></div>
            </div>
            <div class="source-column" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px;">
                <h4 style="box-sizing: border-box; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; line-height: 1.25; font-size: 0.95rem; margin: 0 0 8px; padding-bottom: 4px; border-bottom: 2px solid #00a4e4; color: #005696;">מעגל DC</h4>
                <div class="heat-sim" style="box-sizing: border-box; background: #fff8e5; border: 1px solid #ffe08a; border-radius: 8px; padding: 6px; margin-bottom: 8px; text-align: right;">
                    <strong style="box-sizing: border-box; display: block; color: #7a4b00; font-size: 0.85rem; margin-bottom: 4px;">חימום נגד (DC)</strong>
                    <div class="heat-track" style="box-sizing: border-box; height: 10px; background: #fff; border: 1px solid #f0ad4e; border-radius: 999px; overflow: hidden; direction: ltr;"><div class="heat-fill" id="dcHeatFill" style="box-sizing: border-box; height: 100%; width: 0; background: #f0ad4e; transition: width .2s ease;"></div></div>
                    <span class="heat-value" id="dcHeatValue" style="box-sizing: border-box; direction: ltr; display: inline-block; color: #7a4b00; font-weight: 700; margin-top: 2px; font-size: 0.85rem;">50 mW</span>
                </div>
                <div class="graph-wrap" style="box-sizing: border-box; border: 1px solid #cbd5df; border-radius: 8px; background: #fff; overflow: hidden; padding: 0;"><div id="dcPowerTimeBoard" class="jxgbox" style="box-sizing: border-box; width: 100%; height: 250px; position: relative; overflow: hidden; margin: 0; border: 0; background: #ffffff;"></div></div>
            </div>
        </div>
        
        <div class="metric-row" style="box-sizing: border-box; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;">
            <div class="metric" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px; text-align: center;"><strong style="box-sizing: border-box; display: block; color: #52616b; font-size: 0.8rem; margin-bottom: 2px;">\(V_{RMS}\) (AC)</strong><span id="dispSeriesVrms" style="box-sizing: border-box; font-weight: 700; color: #005696; font-size: 1rem; direction: ltr;">7.07 V</span></div>
            <div class="metric" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px; text-align: center;"><strong style="box-sizing: border-box; display: block; color: #52616b; font-size: 0.8rem; margin-bottom: 2px;">\(V_{DC}\) (DC)</strong><span id="dispSeriesVdc" style="box-sizing: border-box; font-weight: 700; color: #005696; font-size: 1rem; direction: ltr;">7.07 V</span></div>
            <div class="metric" style="box-sizing: border-box; background: #fff; border: 1px solid #d7dde4; border-radius: 8px; padding: 8px; text-align: center;"><strong style="box-sizing: border-box; display: block; color: #52616b; font-size: 0.8rem; margin-bottom: 2px;">סטטוס</strong><span id="dcMatchStatus" style="box-sizing: border-box; font-weight: 700; color: #005696; font-size: 1rem; direction: ltr;">שקול</span></div>
        </div>
    </div>

<!-- תגית מוסתרת להרצת קוד ה-JS באמצעות הפלאגין של מודל -->
<div style="box-sizing: border-box; display: none;"><script type="text/javascript">
    (function () {
    const seriesVpInput = document.getElementById('seriesVp');
    const seriesRInput = document.getElementById('seriesR');
    const dcAutoInput = document.getElementById('dcAuto');
    const dcVoltageInput = document.getElementById('dcVoltage');
    const dispSeriesVrms = document.getElementById('dispSeriesVrms');
    const dispSeriesVdc = document.getElementById('dispSeriesVdc');
    const dcMatchStatus = document.getElementById('dcMatchStatus');
    const acHeatFill = document.getElementById('acHeatFill');
    const acHeatValue = document.getElementById('acHeatValue');
    const dcHeatFill = document.getElementById('dcHeatFill');
    const dcHeatValue = document.getElementById('dcHeatValue');

    function seriesVp() { return parseFloat(seriesVpInput.value) || 10; }
    function seriesR() { return parseFloat(seriesRInput.value) || 1000; }
    function isDcAuto() { return dcAutoInput.checked; }
    function equivalentDcVoltage() {
      return isDcAuto() ? seriesVp() / Math.sqrt(2) : (parseFloat(dcVoltageInput.value) || 0);
    }

    const seriesVoltageBoard = JXG.JSXGraph.initBoard('seriesVoltageBoard', {
      boundingbox: [-0.5, 18, 10.5, -18], axis: true, showNavigation: false, showCopyright: false
    });
    seriesVoltageBoard.create('functiongraph', [function(t){ return seriesVp()*Math.sin(t); }, 0, 10], {strokeColor:'#005696', strokeWidth:3});

    const dcPowerTimeBoard = JXG.JSXGraph.initBoard('dcPowerTimeBoard', {
      boundingbox: [-0.5, 18, 10.5, -18], axis: true, showNavigation: false, showCopyright: false
    });
    dcPowerTimeBoard.create('functiongraph', [equivalentDcVoltage, 0, 10], {strokeColor:'#d9534f', strokeWidth:3});

    function updateDisplay() {
      const vp = seriesVp();
      const vrms = vp / Math.sqrt(2);
      dcVoltageInput.disabled = isDcAuto();
      if (isDcAuto()) dcVoltageInput.value = vrms.toFixed(2);
      const vdc = equivalentDcVoltage();
      
      const acPower = (vrms * vrms / seriesR()) * 1000;
      const dcPower = (vdc * vdc / seriesR()) * 1000;
      
      dispSeriesVrms.textContent = vrms.toFixed(2) + ' V';
      dispSeriesVdc.textContent = vdc.toFixed(2) + ' V';
      acHeatValue.textContent = acPower.toFixed(1) + ' mW';
      dcHeatValue.textContent = dcPower.toFixed(1) + ' mW';
      
      const maxP = Math.max(acPower, dcPower, 1);
      acHeatFill.style.width = (acPower/maxP*100) + '%';
      dcHeatFill.style.width = (dcPower/maxP*100) + '%';
      
      const diff = Math.abs(vdc - vrms);
      dcMatchStatus.textContent = diff < 0.1 ? 'שקול' : (vdc > vrms ? 'גבוה' : 'נמוך');
      dcMatchStatus.style.color = diff < 0.1 ? '#28a745' : '#d9534f';

      seriesVoltageBoard.setBoundingBox([-0.5, vp*1.2, 10.5, -vp*1.2]);
      dcPowerTimeBoard.setBoundingBox([-0.5, Math.max(vp, vdc)*1.2, 10.5, -0.5]);
      seriesVoltageBoard.update();
      dcPowerTimeBoard.update();
      
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise();
      }
    }

    [seriesVpInput, seriesRInput, dcAutoInput, dcVoltageInput].forEach(el => el.addEventListener('input', updateDisplay));
    updateDisplay();
    })();
</script></div>

        </div>
    </div>
</div>

</body>
